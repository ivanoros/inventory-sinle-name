<div class="slabdashboard-page">
  <app-slabdashboard-header></app-slabdashboard-header>

  <app-slabdashboard-tabs
    activeTab="inventory"
    [inventoryTabOpen]="store.inventoryTabOpen()"
    [securityTabs]="store.securityTabs()"
    (inventoryTabClosed)="closeInventoryTab()"
    (securityTabClosed)="closeSecurityTab($event)">
  </app-slabdashboard-tabs>

  <section class="toolbar">
    <label class="inventory-trader-list">
      Trader List
      <select>
        <option>Show All</option>
      </select>
    </label>

    <div class="button-group">
      <button [class.active]="store.selectedView() === 'sod'" (click)="setView('sod')">SOD</button>
      <button [class.active]="store.selectedView() === 'live'" (click)="setView('live')">Live</button>
      <button [class.active]="store.selectedView() === 'gc'" (click)="setView('gc')">GC</button>
      <button [class.active]="store.selectedView() === 'warm'" (click)="setView('warm')">Warm</button>
      <button [class.active]="store.selectedView() === 'htb'" (click)="setView('htb')">HTB</button>
      <button [class.active]="store.selectedView() === 'special'" (click)="setView('special')">Special</button>
    </div>

    <div class="button-group">
      <button>Borrow need</button>
      <button class="active">Excess return</button>
      <button>Pending Settlement</button>
    </div>

    <div class="button-group">
      <button>Contractual</button>
      <button class="active">Pessimistic</button>
    </div>

    <div class="layout-controls" aria-label="Inventory layouts">
      <span>Layout</span>
      <div class="editable-combo">
        <input
          type="text"
          placeholder="Layout name"
          [value]="layoutDraftName()"
          (focus)="openLayoutMenu()"
          (blur)="closeLayoutMenuSoon()"
          (input)="setLayoutDraftName($event)" />
        <button type="button" class="combo-toggle" aria-label="Show layouts" (mousedown)="$event.preventDefault()" (click)="openLayoutMenu()">v</button>
        @if (layoutMenuOpen()) {
          <div class="combo-menu">
            <button type="button" (mousedown)="$event.preventDefault(); chooseLayoutName('Default')">Default</button>
            @for (layoutName of layoutNames(); track layoutName) {
              <button type="button" (mousedown)="$event.preventDefault(); chooseLayoutName(layoutName)">{{ layoutName }}</button>
            }
          </div>
        }
      </div>
      <button
        type="button"
        (click)="saveNamedLayout()"
        [disabled]="!layoutDraftName().trim() || isReservedLayoutName(layoutDraftName())">
        Save
      </button>
      <button type="button" (click)="deleteNamedLayout()" [disabled]="!canDeleteLayoutName(layoutDraftName())">Delete</button>
      @if (layoutSaveMessage()) {
        <span class="layout-save-message">{{ layoutSaveMessage() }}</span>
      }
    </div>

    <label class="checkbox">
      <input type="checkbox" [checked]="store.includeRecalls()" />
      Include recalls
    </label>

    <label class="checkbox">
      <input type="checkbox" [checked]="store.rounding()" />
      Rounding
    </label>

    <button class="export">Export</button>
  </section>

  <section class="grid-shell">
    <ag-grid-angular
      class="ag-theme-quartz inventory-grid"
      [modules]="agGridModules"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)">
    </ag-grid-angular>
  </section>

  <footer class="status-bar">
    <span></span>
    <span class="connectivity">● Connectivity</span>
  </footer>
</div>
