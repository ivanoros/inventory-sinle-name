<div class="slabdashboard-page">
  <app-slabdashboard-header></app-slabdashboard-header>

  <app-slabdashboard-tabs
    activeTab="inventory"
    [inventoryTabOpen]="store.inventoryTabOpen()"
    [securityTabs]="store.securityTabs()"
    (inventoryTabClosed)="closeInventoryTab()"
    (securityTabClosed)="closeSecurityTab($event)">
  </app-slabdashboard-tabs>

  <section class="toolbar">
    <label class="inventory-trader-list">
      Trader List
      <select>
        <option>Show All</option>
      </select>
    </label>

    <div class="button-group">
      <button [class.active]="store.selectedView() === 'sod'" (click)="setView('sod')">SOD</button>
      <button [class.active]="store.selectedView() === 'live'" (click)="setView('live')">Live</button>
      <button [class.active]="store.selectedView() === 'gc'" (click)="setView('gc')">GC</button>
      <button [class.active]="store.selectedView() === 'warm'" (click)="setView('warm')">Warm</button>
      <button [class.active]="store.selectedView() === 'htb'" (click)="setView('htb')">HTB</button>
      <button [class.active]="store.selectedView() === 'special'" (click)="setView('special')">Special</button>
    </div>

    <div class="button-group">
      <button>Borrow need</button>
      <button class="active">Excess return</button>
      <button>Pending Settlement</button>
    </div>

    <div class="button-group">
      <button>Contractual</button>
      <button class="active">Pessimistic</button>
    </div>

    <app-grid-layout-control label="Layout" [layoutKey]="layoutKey" [gridApi]="gridApi"></app-grid-layout-control>

    <label class="checkbox">
      <input type="checkbox" [checked]="store.includeRecalls()" />
      Include recalls
    </label>

    <label class="checkbox">
      <input type="checkbox" [checked]="store.rounding()" />
      Rounding
    </label>

    <button class="export">Export</button>
  </section>

  <section class="grid-shell">
    <ag-grid-angular
      class="ag-theme-quartz inventory-grid"
      [modules]="agGridModules"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)">
    </ag-grid-angular>
  </section>

  <footer class="status-bar">
    <span></span>
    <span class="connectivity">● Connectivity</span>
  </footer>
</div>
