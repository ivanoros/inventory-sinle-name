<aside class="right-panel">
  <section class="card">
    <h3>Fees</h3>
    <app-single-name-fees-chart [fees]="fees()"></app-single-name-fees-chart>

    <div class="fee-table">
      @for (item of sidebar().feeStats; track item.label) {
        <div>{{ item.label }}</div><strong>{{ item.value }}</strong>
      }
    </div>
  </section>

  <section class="card">
    <h3>Stats</h3>
    <div class="stats-table">
      @for (item of sidebar().stats; track item.label) {
        <div>{{ item.label }}</div><strong>{{ item.value }}</strong>
      }
    </div>
  </section>

  <section class="card">
    <h3>Overborrows</h3>
    <div class="stats-table">
      @for (item of sidebar().overborrows; track item.label) {
        <div>{{ item.label }}</div><strong>{{ item.value }}</strong>
      }
    </div>
  </section>
</aside>
