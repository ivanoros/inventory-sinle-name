<!-- src/app/features/slabdashboard/single-name/pages/single-name-page/single-name-page.html -->
<div class="slabdashboard-page">
  <app-slabdashboard-header></app-slabdashboard-header>

  @if (replacesInventory()) {
    <nav class="inventory-return">
      <a routerLink="/">Back to Inventory list</a>
    </nav>
  } @else {
    <app-slabdashboard-tabs
      [activeTab]="store.ticker()"
      [inventoryTabOpen]="store.inventoryTabOpen()"
      [securityTabs]="store.securityTabs()"
      (inventoryTabClosed)="closeInventoryTab()"
      (securityTabClosed)="closeSecurityTab($event)">
    </app-slabdashboard-tabs>
  }

  <section class="refresh-toolbar">
    <p-button
      ariaLabel="Refresh from backend"
      title="Refresh from backend"
      severity="secondary"
      size="small"
      [rounded]="true"
      [text]="true"
      (onClick)="refreshFromBackend()">
      <ng-template #icon let-class="class">
        <svg data-p-icon="refresh" [class]="class"></svg>
      </ng-template>
    </p-button>
    <p-button
      [ariaLabel]="store.autoRefreshEnabled() ? 'Stop auto refresh' : 'Start auto refresh'"
      [title]="store.autoRefreshEnabled() ? 'Stop auto refresh' : 'Start auto refresh'"
      [severity]="store.autoRefreshEnabled() ? 'primary' : 'secondary'"
      size="small"
      [rounded]="true"
      [text]="!store.autoRefreshEnabled()"
      (onClick)="toggleRefreshTimer()">
      <ng-template #icon let-class="class">
        @if (store.autoRefreshEnabled()) {
          <svg data-p-icon="times" [class]="class"></svg>
        } @else {
          <svg data-p-icon="caret-right" [class]="class"></svg>
        }
      </ng-template>
    </p-button>
  </section>

  @if (store.error(); as errorMessage) {
    <main class="content loading-state">
      <app-error-alert [message]="errorMessage"></app-error-alert>
    </main>
  } @else if (store.detail(); as singleName) {
    <main
      class="content"
      [class.resizing]="store.resizingSidebar()"
      [style.--sidebar-width.px]="store.sidebarWidth()">
      <section class="left-panel">
        <app-security-summary [detail]="singleName"></app-security-summary>

        <app-position-panel
          [position]="singleName.position"
          [agGridModules]="agGridModules"
          [drilldownRows]="store.drilldownRows()"
          [drilldownColumnDefs]="drilldownColumnDefs"
          [gridOptions]="drilldownGridOptions"
          [drilldownVisible]="store.drilldownVisible()"
          [showOptions]="store.showOptions()"
          [showEmptyRows]="store.showEmptyDrilldownRows()"
          [includeNonEntitlement]="store.includeNonEntitlement()"
          (drilldownToggled)="toggleDrilldown()"
          (optionsToggled)="toggleOptions()"
          (showEmptyRowsChanged)="store.setShowEmptyDrilldownRows($event)"
          (includeNonEntitlementChanged)="store.setIncludeNonEntitlement($event)">
          <app-grid-layout-control
            position-actions
            label="Layouts:"
            [layoutKey]="singleNameLayoutKey"
            [gridTargets]="singleNameLayoutTargets()">
          </app-grid-layout-control>
        </app-position-panel>

        <app-lender-availability
          [agGridModules]="agGridModules"
          [rows]="store.lenderRows()"
          [lenderTotal]="singleName.lenderTotal"
          [dailyChange]="singleName.dailyChange"
          [gridOptions]="lenderGridOptions">
        </app-lender-availability>
      </section>

      <div
        class="splitter"
        role="separator"
        aria-orientation="vertical"
        tabindex="0"
        (pointerdown)="startSidebarResize($event)"
        (pointermove)="resizeSidebar($event)"
        (pointerup)="stopSidebarResize($event)"
        (pointercancel)="stopSidebarResize($event)">
        <span></span>
      </div>

      <app-single-name-sidebar
        [fees]="singleName.fees"
        [sidebar]="singleName.sidebar">
      </app-single-name-sidebar>
    </main>
  } @else if (store.loading()) {
    <main class="content loading-state">
      <app-loading-spinner></app-loading-spinner>
    </main>
  }
</div>
