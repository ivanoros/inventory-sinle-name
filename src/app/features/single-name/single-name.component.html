<!-- src/app/features/single-name/single-name.component.html -->
<div class="workbench-page">
  <header class="top-bar">
    <div class="brand">
      <span class="logo">BNP PARIBAS</span>
      <span class="tagline">The bank for a changing world</span>
    </div>

    <div class="right-title">
      <span>e70165</span>
      <span>AMER</span>
      <strong>WORKBENCH</strong>
      <span>⚙</span>
    </div>
  </header>

  <app-single-name-tabs
    [activeTicker]="ticker()"
    [securityTabs]="securityTabs()">
  </app-single-name-tabs>

  @if (detail(); as singleName) {
    <main class="content">
      <section class="left-panel">
        <app-security-summary [detail]="singleName"></app-security-summary>

        <app-position-panel
          [position]="singleName.position"
          [agGridModules]="agGridModules"
          [drilldownRows]="drilldownRows()"
          [drilldownColumnDefs]="drilldownColumnDefs"
          [gridOptions]="gridOptions"
          [drilldownVisible]="drilldownVisible()"
          [showOptions]="showOptions()"
          (drilldownToggled)="toggleDrilldown()"
          (optionsToggled)="toggleOptions()">
        </app-position-panel>

        <app-lender-availability
          [agGridModules]="agGridModules"
          [rows]="lenderRows()"
          [lenderTotal]="singleName.lenderTotal"
          [dailyChange]="singleName.dailyChange"
          [gridOptions]="gridOptions">
        </app-lender-availability>
      </section>

      <app-single-name-sidebar
        [fees]="singleName.fees"
        [sidebar]="singleName.sidebar">
      </app-single-name-sidebar>
    </main>
  } @else {
    <main class="content loading-state">Loading security...</main>
  }
</div>
