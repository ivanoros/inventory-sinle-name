<!-- src/app/features/single-name/single-name.component.html -->
<div class="workbench-page">
  <header class="top-bar">
    <div class="brand">
      <span class="logo">BNP PARIBAS</span>
      <span class="tagline">The bank for a changing world</span>
    </div>

    <div class="right-title">
      <span>e70165</span>
      <span>AMER</span>
      <strong>WORKBENCH</strong>
      <span>⚙</span>
    </div>
  </header>

  <app-single-name-tabs
    [activeTicker]="ticker()"
    [securityTabs]="securityTabs()">
  </app-single-name-tabs>

  <main class="content">
    <section class="left-panel">
      <app-security-summary [detail]="detail()"></app-security-summary>

      <app-position-panel
        [agGridModules]="agGridModules"
        [drilldownRows]="drilldownRows()"
        [drilldownColumnDefs]="drilldownColumnDefs"
        [gridOptions]="gridOptions"
        [drilldownVisible]="drilldownVisible()"
        [showOptions]="showOptions()"
        (drilldownToggled)="toggleDrilldown()"
        (optionsToggled)="toggleOptions()">
      </app-position-panel>

      <app-lender-availability
        [agGridModules]="agGridModules"
        [rows]="lenderRows()"
        [lenderTotal]="detail().lenderTotal"
        [dailyChange]="detail().dailyChange"
        [gridOptions]="gridOptions">
      </app-lender-availability>
    </section>

    <app-single-name-sidebar [fees]="detail().fees"></app-single-name-sidebar>
  </main>
</div>
