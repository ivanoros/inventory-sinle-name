<section class="tab-bar">
  <a routerLink="/" class="home">⌂</a>
  <a routerLink="/" class="tab">Inventory</a>
  @for (securityTicker of securityTabs(); track securityTicker) {
    <a
      class="tab"
      [class.active]="securityTicker === activeTicker()"
      [routerLink]="['/single-name', securityTicker]">
      {{ securityTicker }} US
    </a>
  }
  <button class="tab">+</button>
</section>
