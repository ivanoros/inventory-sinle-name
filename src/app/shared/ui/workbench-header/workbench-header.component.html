<header class="top-bar">
  <div class="brand">
    <span class="logo">BNP PARIBAS</span>
    <span class="tagline">The bank for a changing world</span>
  </div>

  <div class="right-title">
    <span>e70165</span>
    <span>AMER</span>
    <strong>WORKBENCH</strong>
    <button
      class="theme-toggle"
      type="button"
      [attr.aria-label]="theme.toggleLabel()"
      [title]="theme.toggleLabel()"
      (click)="theme.toggleTheme()">
      {{ theme.toggleIcon() }}
    </button>
    <span class="gear">⚙</span>
  </div>
</header>
